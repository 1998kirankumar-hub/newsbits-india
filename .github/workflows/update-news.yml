name: Update News Feed

on:
  schedule:
    # Runs every 30 minutes. Edit this cron expression to change frequency.
    - cron: "*/30 * * * *"
  workflow_dispatch: {}   # lets you trigger a run manually from the Actions tab

permissions:
  contents: write

jobs:
  update-news:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Fetch latest news
        env:
          # Optional: add GROQ_API_KEY as a repo secret (Settings -> Secrets
          # and variables -> Actions) to have summaries rewritten in original
          # wording via Groq's free API instead of using the raw publisher
          # snippet. Free, no credit card required: console.groq.com
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python3 fetch_news.py

      - name: Commit and push if changed
        run: |
          git config user.name "news-bot"
          git config user.email "news-bot@users.noreply.github.com"
          git add news.json summary_cache.json
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Update news feed [automated]"
            git push
          fi
